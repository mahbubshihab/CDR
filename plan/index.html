                <div class="space-y-6">
                    <h2 class="text-2xl font-bold text-blue-400">অফলাইন পিডিএফ ও এক্সেল রিপোর্ট এক্সপোর্ট</h2>
                    <p class="text-gray-300">আইনশৃঙ্খলা বাহিনী বা তদন্তকারী অফিসারদের আদালতে প্রমাণের স্বার্থে এবং লিখিত ফাইল ফাইলিং এর জন্য প্রিন্ট-রেডি ফরেনসিক রিপোর্টের প্রয়োজন হয়।</p>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="bg-gray-900/60 p-4 rounded border border-gray-800 space-y-2">
                            <h3 class="font-bold text-emerald-400">PDF ফরেনসিক ফাইল</h3>
                            <p class="text-sm text-gray-300"><code>jsPDF</code> ও <code>jspdf-autotable</code> ব্যবহার করে সরাসরি ব্রাউজারে একটি সুবিন্যস্ত পিডিএফ রিপোর্ট জেনারেট করা হবে। এতে থাকবে:</p>
                            <ul class="list-disc pl-5 text-xs text-gray-400 space-y-1">
                                <li>লোগো ও মামলার কভার পেজ।</li>
                                <li>কলের প্রধান প্রধান KPI পরিসংখ্যান।</li>
                                <li>শীর্ষ ১০টি কন্টাক্ট এবং তাদের সাথে কলের তালিকা।</li>
                                <li>সন্দেহভাজনের যাতায়াতের রুটম্যাপ স্ক্রিনশট এবং বাসস্থানের ঠিকানা।</li>
                                <li>ফাইলটির ডাটা ইন্টিগ্রিটি প্রমাণের জন্য SHA-256 হ্যাশ কোড।</li>
                            </ul>
                        </div>

                        <div class="bg-gray-900/60 p-4 rounded border border-gray-800 space-y-2">
                            <h3 class="font-bold text-emerald-400">Excel ফাইল ডাটা ক্লিনআপ</h3>
                            <p class="text-sm text-gray-300">তদন্তকারীরা চাইলে মূল ডাটার প্রসেসড কন্টেন্ট এক্সেল আকারে এক্সপোর্ট করতে পারবেন। এতে থাকবে ৪টি ভিন্ন শিট:</p>
                            <ul class="list-disc pl-5 text-xs text-gray-400 space-y-1">
                                <li><code>Case_Summary</code>: কেসের প্রাথমিক তথ্য।</li>
                                <li><code>Contacts_Analysis</code>: কন্টাক্ট নম্বর এবং কলের পরিসংখ্যান।</li>
                                <li><code>Tower_Locations</code>: ব্যবহৃত টাওয়ার ও জিপিএস কোঅর্ডিনেট।</li>
                                <li><code>Unified_CDR</code>: সম্পূর্ণ পরিশোধিত এবং সাজানো মূল ডাটাবেস।</li>
                            </ul>
                        </div>
                    </div>
                </div>
            `
        };

        const navContainer = document.getElementById('nav-container');
        const contentContainer = document.getElementById('content-container');

        // Render Sidebar Navigation
        Object.keys(sectionsData).forEach((title, idx) => {
            const btn = document.createElement('button');
            btn.className = `w-full text-left px-3 py-2.5 rounded text-sm font-medium transition-all duration-150 flex items-center justify-between text-gray-400 hover:bg-gray-800/30 hover:text-gray-200`;
            btn.innerHTML = `
                <span>${title}</span>
                <span class="text-[10px] font-mono text-gray-600">0${idx+1}</span>
            `;
            btn.onclick = () => selectSection(title, btn);
            btn.setAttribute('id', `nav-tab-${idx}`);
            navContainer.appendChild(btn);
        });

        function selectSection(title, btnElement) {
            // Update Active Buttons
            const buttons = navContainer.querySelectorAll('button');
            buttons.forEach(b => {
                b.classList.remove('active-tab', 'text-blue-400');
                b.classList.add('text-gray-400');
            });
            btnElement.classList.add('active-tab', 'text-blue-400');
            btnElement.classList.remove('text-gray-400');

            // Set Content
            contentContainer.innerHTML = `
                <div class="max-w-4xl mx-auto glass p-8 rounded-xl shadow-2xl border border-gray-800/50">
                    <div class="mb-2 text-xs font-mono text-blue-500 font-semibold tracking-widest uppercase">প্ল্যান সেকশন - ${title}</div>
                    <div class="prose prose-invert max-w-none">
                        ${sectionsData[title]}
                    </div>
                </div>
            `;
            // Scroll Content to Top
            contentContainer.scrollTop = 0;
        }

        // Auto select first tab on load
        window.addEventListener('DOMContentLoaded', () => {
            const firstTitle = Object.keys(sectionsData)[0];
            const firstBtn = navContainer.querySelector('button');
            if (firstBtn) selectSection(firstTitle, firstBtn);
        });
    </script>
</body>
</html>
